<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart AI Router</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #080810;
    color: #fff;
    font-family: 'Plus Jakarta Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 50px 20px;
  }

  .header { text-align: center; margin-bottom: 48px; }

  .header h1 {
    font-size: 2.8rem;
    font-weight: 800;
    background: linear-gradient(135deg, #c084fc, #818cf8, #38bdf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
  }

  .header p { color: #555; font-size: 1rem; }

  .input-wrap {
    width: 100%;
    max-width: 720px;
    background: #0f0f1a;
    border: 1.5px solid #1e1e35;
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 16px;
    transition: border-color 0.3s;
  }

  .input-wrap:focus-within { border-color: #7c3aed; }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: #e2e8f0;
    font-size: 1.05rem;
    resize: none;
    min-height: 110px;
    font-family: inherit;
    line-height: 1.6;
  }

  textarea::placeholder { color: #333; }

  .input-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #1a1a2e;
  }

  .hint { color: #333; font-size: 0.8rem; }

  .route-btn {
    padding: 12px 28px;
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 1rem;
    cursor: pointer;
    font-weight: 700;
    font-family: inherit;
    transition: transform 0.2s, opacity 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .route-btn:hover { transform: translateY(-2px); opacity: 0.9; }

  #result { width: 100%; max-width: 720px; margin-top: 32px; }

  .result-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #444;
    margin-bottom: 14px;
    font-weight: 600;
  }

  .best-card {
    background: linear-gradient(135deg, #13103a, #0f1729);
    border: 1.5px solid #7c3aed;
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .best-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #7c3aed, #38bdf8);
  }

  .card-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .ai-emoji { font-size: 2rem; }

  .ai-info { flex: 1; }

  .ai-name {
    font-size: 1.3rem;
    font-weight: 800;
    margin-bottom: 2px;
  }

  .ai-tagline { color: #666; font-size: 0.85rem; }

  .best-badge {
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    color: white;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
  }

  .reason-box {
    background: rgba(255,255,255,0.03);
    border: 1px solid #1e1e35;
    border-radius: 12px;
    padding: 14px 18px;
    color: #94a3b8;
    font-size: 0.92rem;
    line-height: 1.6;
    margin-bottom: 20px;
  }

  .open-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    border-radius: 12px;
    color: white;
    text-decoration: none;
    font-weight: 700;
    font-size: 0.95rem;
    transition: transform 0.2s, opacity 0.2s;
  }

  .open-btn:hover { transform: translateY(-2px); opacity: 0.85; }

  .others-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 8px;
  }

  .other-card {
    background: #0f0f1a;
    border: 1.5px solid #1a1a2e;
    border-radius: 16px;
    padding: 20px;
    transition: border-color 0.2s;
  }

  .other-card:hover { border-color: #2a2a4a; }

  .other-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .other-name { font-size: 1rem; font-weight: 700; }

  .other-reason {
    color: #555;
    font-size: 0.83rem;
    line-height: 1.5;
    margin-bottom: 14px;
  }

  .other-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 16px;
    border-radius: 10px;
    color: white;
    text-decoration: none;
    font-weight: 600;
    font-size: 0.85rem;
    transition: opacity 0.2s;
  }

  .other-btn:hover { opacity: 0.8; }

  @media (max-width: 500px) {
    .others-grid { grid-template-columns: 1fr; }
    .header h1 { font-size: 2rem; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🧠 Smart AI Router</h1>
  <p>আপনার কাজ বুঝে সেরা AI খুঁজে দেবো — ০ টাকায়</p>
</div>

<div class="input-wrap">
  <textarea id="taskInput" placeholder="আপনার কাজ বা প্রশ্ন লিখুন...&#10;যেমন: 2+2-5=? অথবা একটা গল্প লিখো অথবা AI নিয়ে research paper খুঁজো"></textarea>
  <div class="input-footer">
    <span class="hint">Ctrl + Enter দিয়েও search করতে পারবেন</span>
    <button class="route-btn" onclick="routeTask()">🚀 সেরা AI খুঁজো</button>
  </div>
</div>

<div id="result"></div>

<script>
const AIs = {
  claude: {
    name: "Claude",
    emoji: "🔮",
    tagline: "Anthropic এর AI — লেখা ও বিশ্লেষণে সেরা",
    color: "#7c3aed",
    url: (q) => `https://claude.ai/new?q=${encodeURIComponent(q)}`
  },
  chatgpt: {
    name: "ChatGPT",
    emoji: "🤖",
    tagline: "OpenAI এর AI — Math ও Coding এ সেরা",
    color: "#10a37f",
    url: (q) => `https://chatgpt.com/?q=${encodeURIComponent(q)}`
  },
  gemini: {
    name: "Gemini",
    emoji: "✨",
    tagline: "Google এর AI — Real-time তথ্যে সেরা",
    color: "#4285f4",
    url: (q) => `https://gemini.google.com/app?q=${encodeURIComponent(q)}`
  }
};

const RULES = [
  {
    keywords: ['code','coding','program','python','javascript','java','c++','bug','error','function','algorithm','math','calculation','solve','equation','গণিত','সমীকরণ','হিসাব','calculate','=?','integral','derivative','calculus','algebra','geometry','trigonometry'],
    best: 'chatgpt',
    reason: '🔢 Math ও Coding এ ChatGPT বিশ্বের সেরা। Step-by-step সমাধান দেয়, কোনো ভুল করে না।',
    others: [
      { ai: 'claude', reason: 'Code explain ও debug করতে দারুণ' },
      { ai: 'gemini', reason: 'Technical সমস্যায় সাহায্য করে' }
    ]
  },
  {
    keywords: ['news','আজকের','current','latest','এখন','today','weather','আবহাওয়া','recent','2024','2025','2026','কত দাম','price','stock','market'],
    best: 'gemini',
    reason: '🌍 Real-time তথ্য ও আজকের news এ Gemini সেরা। Google এর সব data ব্যবহার করে।',
    others: [
      { ai: 'chatgpt', reason: 'সাধারণ তথ্যের জন্য ভালো' },
      { ai: 'claude', reason: 'তথ্য বিশ্লেষণ করতে সাহায্য করবে' }
    ]
  },
  {
    keywords: ['লেখো','লিখ','গল্প','কবিতা','বাংলা','অনুবাদ','explain','বুঝিয়ে','analysis','সারাংশ','summary','translate','write','essay','creative','email','letter','চিঠি','রচনা','প্রবন্ধ'],
    best: 'claude',
    reason: '✍️ লেখালেখি, বিশ্লেষণ ও বাংলায় Claude সবচেয়ে সেরা। সুন্দর ও গভীর উত্তর দেয়।',
    others: [
      { ai: 'chatgpt', reason: 'Creative writing এ ভালো বিকল্প' },
      { ai: 'gemini', reason: 'বিভিন্ন ভাষায় সাহায্য করে' }
    ]
  },
  {
    keywords: ['image','ছবি','photo','video','ভিডিও','visual','design','diagram','chart','graph','দেখাও'],
    best: 'gemini',
    reason: '🖼️ Image বোঝা ও visual কাজে Gemini সবচেয়ে এগিয়ে। Multimodal AI হিসেবে সেরা।',
    others: [
      { ai: 'chatgpt', reason: 'Image analysis করতে পারে' },
      { ai: 'claude', reason: 'Image নিয়ে আলোচনা করতে ভালো' }
    ]
  }
];

function routeTask() {
  const task = document.getElementById('taskInput').value.trim();
  if (!task) { alert('আগে কাজ লিখুন!'); return; }

  const lower = task.toLowerCase();
  let matched = null;

  for (const rule of RULES) {
    if (rule.keywords.some(k => lower.includes(k))) {
      matched = rule;
      break;
    }
  }

  if (!matched) {
    matched = {
      best: 'claude',
      reason: '🧠 সাধারণ প্রশ্ন ও যেকোনো কাজে Claude সবচেয়ে ভালো সাহায্য করে।',
      others: [
        { ai: 'chatgpt', reason: 'বিকল্প হিসেবে সবসময় ভালো' },
        { ai: 'gemini', reason: 'Google এর শক্তি ব্যবহার করে' }
      ]
    };
  }

  const best = AIs[matched.best];
  const others = matched.others;

  let html = `<p class="result-label">⭐ আপনার কাজের জন্য সেরা AI</p>`;

  html += `
    <div class="best-card">
      <div class="card-top">
        <span class="ai-emoji">${best.emoji}</span>
        <div class="ai-info">
          <div class="ai-name">${best.name}</div>
          <div class="ai-tagline">${best.tagline}</div>
        </div>
        <span class="best-badge">✓ সেরা পছন্দ</span>
      </div>
      <div class="reason-box">${matched.reason}</div>
      <a href="${best.url(task)}" target="_blank" class="open-btn" style="background:${best.color}">
        ${best.emoji} ${best.name} এ এখনই খুলুন →
      </a>
    </div>
  `;

  html += `<p class="result-label" style="margin-top:24px">🔄 অন্য বিকল্প</p>`;
  html += `<div class="others-grid">`;

  others.forEach(o => {
    const ai = AIs[o.ai];
    html += `
      <div class="other-card">
        <div class="other-top">
          <span style="font-size:1.4rem">${ai.emoji}</span>
          <span class="other-name">${ai.name}</span>
        </div>
        <p class="other-reason">${o.reason}</p>
        <a href="${ai.url(task)}" target="_blank" class="other-btn" style="background:${ai.color}">
          খুলুন →
        </a>
      </div>
    `;
  });

  html += `</div>`;
  document.getElementById('result').innerHTML = html;
  document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
}

document.getElementById('taskInput').addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 'Enter') routeTask();
});
</script>
</body>
</html>
