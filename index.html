<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart AI Router</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    min-height: 100vh;
    background: #0a0a0f;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  h1 {
    font-size: 2.2rem;
    background: linear-gradient(135deg, #a78bfa, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
    text-align: center;
  }

  p.subtitle {
    color: #666;
    margin-bottom: 40px;
    text-align: center;
  }

  .input-box {
    width: 100%;
    max-width: 700px;
    background: #13131f;
    border: 1px solid #2a2a3f;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
  }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-size: 1rem;
    resize: none;
    min-height: 100px;
    font-family: inherit;
  }

  textarea::placeholder { color: #444; }

  button#routeBtn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #7c3aed, #3b82f6);
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 1.1rem;
    cursor: pointer;
    font-weight: 600;
    transition: opacity 0.2s;
  }

  button#routeBtn:hover { opacity: 0.85; }

  #result {
    width: 100%;
    max-width: 700px;
    display: none;
  }

  .ai-card {
    background: #13131f;
    border: 1px solid #2a2a3f;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .ai-card.best {
    border-color: #7c3aed;
    box-shadow: 0 0 20px rgba(124, 58, 237, 0.3);
  }

  .ai-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .ai-name {
    font-size: 1.1rem;
    font-weight: 700;
  }

  .badge {
    background: #7c3aed;
    color: white;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
  }

  .reason {
    color: #aaa;
    font-size: 0.9rem;
    margin-bottom: 14px;
    line-height: 1.5;
  }

  .open-btn {
    display: inline-block;
    padding: 10px 20px;
    border-radius: 10px;
    color: white;
    text-decoration: none;
    font-weight: 600;
    font-size: 0.9rem;
    transition: opacity 0.2s;
  }

  .open-btn:hover { opacity: 0.8; }

  .loading {
    text-align: center;
    color: #7c3aed;
    padding: 30px;
    font-size: 1rem;
  }

  .section-title {
    color: #555;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    margin-top: 4px;
  }
</style>
</head>
<body>

<h1>🧠 Smart AI Router</h1>
<p class="subtitle">আপনার কাজ বুঝে সেরা AI খুঁজে দেবো</p>

<div class="input-box">
  <textarea id="taskInput" placeholder="আপনার কাজ বা প্রশ্ন লিখুন... যেমন: একটা Python code লিখে দাও, বা বাংলাদেশের ইতিহাস সম্পর্কে জানতে চাই"></textarea>
</div>

<button id="routeBtn" onclick="routeTask()">🚀 সেরা AI খুঁজো</button>

<div id="result"></div>

<script>
const AI_INFO = {
  claude: {
    name: "Claude",
    emoji: "🔮",
    color: "#7c3aed",
    url: (q) => `https://claude.ai/new?q=${encodeURIComponent(q)}`
  },
  chatgpt: {
    name: "ChatGPT",
    emoji: "🤖",
    color: "#10a37f",
    url: (q) => `https://chatgpt.com/?q=${encodeURIComponent(q)}`
  },
  gemini: {
    name: "Gemini",
    emoji: "✨",
    color: "#4285f4",
    url: (q) => `https://gemini.google.com/app?q=${encodeURIComponent(q)}`
  },
  perplexity: {
    name: "Perplexity",
    emoji: "🔍",
    color: "#20b2aa",
    url: (q) => `https://www.perplexity.ai/?q=${encodeURIComponent(q)}`
  },
  consensus: {
    name: "Consensus",
    emoji: "📚",
    color: "#f59e0b",
    url: (q) => `https://consensus.app/search/?q=${encodeURIComponent(q)}`
  }
};

async function routeTask() {
  const task = document.getElementById('taskInput').value.trim();
  if (!task) return alert('আগে কাজ লিখুন!');

  const resultDiv = document.getElementById('result');
  resultDiv.style.display = 'block';
  resultDiv.innerHTML = '<div class="loading">🔄 বিশ্লেষণ করছি...</div>';

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: `তুমি একটা AI Router। নিচের কাজটা বিশ্লেষণ করো এবং শুধু JSON দাও।

কাজ: "${task}"

AI গুলো হলো: claude, chatgpt, gemini, perplexity, consensus

নিয়ম:
- claude: লেখা, বিশ্লেষণ, সৃজনশীল কাজ, বাংলা
- chatgpt: coding, math, technical
- gemini: real-time তথ্য, news, multimodal
- perplexity: web search, current events
- consensus: academic research, scientific papers

শুধু এই JSON দাও, আর কিছু না:
{
  "best": "ai_name",
  "best_reason": "কেন এটা সেরা (বাংলায় ১ লাইন)",
  "others": [
    {"ai": "ai_name", "reason": "কেন কাজে লাগবে (বাংলায়)"},
    {"ai": "ai_name", "reason": "কেন কাজে লাগবে (বাংলায়)"}
  ]
}`
        }]
      })
    });

    const data = await response.json();
    const text = data.content[0].text.trim();
    const clean = text.replace(/```json|```/g, '').trim();
    const result = JSON.parse(clean);

    const best = AI_INFO[result.best];
    let html = `<p class="section-title">⭐ সেরা AI</p>`;
    html += `
      <div class="ai-card best">
        <div class="ai-header">
          <span style="font-size:1.5rem">${best.emoji}</span>
          <span class="ai-name">${best.name}</span>
          <span class="badge">সেরা পছন্দ</span>
        </div>
        <p class="reason">${result.best_reason}</p>
        <a href="${best.url(task)}" target="_blank" class="open-btn" style="background:${best.color}">
          ${best.name} এ খুলুন →
        </a>
      </div>
    `;

    if (result.others && result.others.length > 0) {
      html += `<p class="section-title">🔄 অন্য বিকল্প</p>`;
      result.others.forEach(o => {
        const ai = AI_INFO[o.ai];
        if (!ai) return;
        html += `
          <div class="ai-card">
            <div class="ai-header">
              <span style="font-size:1.3rem">${ai.emoji}</span>
              <span class="ai-name">${ai.name}</span>
            </div>
            <p class="reason">${o.reason}</p>
            <a href="${ai.url(task)}" target="_blank" class="open-btn" style="background:${ai.color}">
              ${ai.name} এ খুলুন →
            </a>
          </div>
        `;
      });
    }

    resultDiv.innerHTML = html;

  } catch(e) {
    resultDiv.innerHTML = '<div class="loading" style="color:red">❌ ত্রুটি হয়েছে। আবার চেষ্টা করুন।</div>';
  }
}

document.getElementById('taskInput').addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 'Enter') routeTask();
});
</script>

</body>
</html>
